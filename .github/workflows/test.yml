name: test

# Smoke-tests `alchemy destroy â†’ deploy â†’ destroy` against each example.
# `bun test:canary` drives the whole suite â€” it iterates both bun and pnpm
# runtimes itself and publishes canary tarballs to pkg.ing before deploying.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  # Required for aws-actions/configure-aws-credentials to mint a session
  # via OIDC instead of long-lived AWS_ACCESS_KEY_ID secrets.
  id-token: write

env:
  PKGING_HOST: pkg.ing
  NODE_VERSION: "24"
  # PR runs use `pr-<n>` so each PR has its own isolated cloud namespace;
  # main pushes use `main`; manual `workflow_dispatch` runs use the branch
  # name. Forwarded to the smoke test as $SMOKE_STAGE.
  SMOKE_STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}',
    github.event.number) || (github.ref == 'refs/heads/main' && 'main' ||
    github.ref_name) }}

concurrency:
  # Cancel an in-progress run for the same PR (or branch) when a new push
  # arrives â€” the smoke suite mutates real cloud state, so two parallel
  # runs against the same SMOKE_STAGE would race.
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      # Bootstrap install so `bun test:canary` itself can resolve. The
      # test then runs its own `bun install` + `pnpm install` in canary
      # `beforeAll` after rewriting the catalog to pkg.ing tarballs, so
      # there's nothing pnpm-specific to wire up here.
      - run: bun install

      # OIDC â†’ short-lived AWS session. Exports AWS_ACCESS_KEY_ID,
      # AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION; the
      # `output-credentials: true` flag also surfaces aws-account-id as a
      # step output (which we forward as `AWS_ACCOUNT_ID` below â€” the
      # action does NOT set it as an env var on its own).
      - id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          output-credentials: true

      - name: Smoke
        env:
          # AWS â€” `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`,
          # `AWS_SESSION_TOKEN`, `AWS_REGION` are already exported by
          # configure-aws-credentials; we only need to forward the account
          # id, which Alchemy's `loadFromEnv` requires when CI=true.
          AWS_ACCOUNT_ID: ${{ steps.aws-creds.outputs.aws-account-id }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.TEST_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TEST_CLOUDFLARE_ACCOUNT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PR_PACKAGE_TOKEN: ${{ secrets.PR_PACKAGE_TOKEN }}
          PKGING_HOST: ${{ env.PKGING_HOST }}
          SMOKE_STAGE: ${{ env.SMOKE_STAGE }}
        run: bun test:canary
